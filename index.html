<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Product</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f4f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 320px;
            width: 100%;
        }
        h1 {
            font-size: 1.5rem;
            color: #111827;
            margin-bottom: 0.5rem;
            margin-top: 0;
        }
        .price {
            font-size: 1.25rem;
            color: #10b981;
            font-weight: bold;
            margin-bottom: 2rem;
        }
        #paypal-button-container {
            width: 100%;
            margin-top: 1rem;
            min-height: 150px; 
        }
    </style>
    
    <script src="https://www.paypal.com/sdk/js?client-id=<script src="https://www.paypal.com/sdk/js?client-id=BAA2ROVMef358UGWn2GTLP56s9eSWI7JffOrMXYZiNCMJuACbaL5cvbVm5nIm9K5nCZbjGPZFwdFDuPtPk&currency=USD"></script>
</head>
<body>
    <div class="card">
        <h1>Premium Product</h1>
        <div class="price">$10.00</div>
        
        <div id="paypal-button-container"></div>
    </div>

    <script>
        paypal.Buttons({
            createOrder: function(data, actions) {
                return actions.order.create({
                    purchase_units: [{
                        amount: {
                            value: '1.20' 
                        },
                        description: 'Premium Product'
                    }]
                });
            },
            onApprove: function(data, actions) {
                return actions.order.capture().then(function(orderData) {
                    // Redirects to your new success.html page
                    window.location.href = "/success.html";
                });
            },
            onError: function(err) {
                console.error('PayPal Checkout onError', err);
                alert('Something went wrong with the payment. Please try again.');
            }
        }).render('#paypal-button-container');
    </script>
</body>
</html>
