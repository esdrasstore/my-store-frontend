<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Product</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f4f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 320px;
            width: 100%;
        }
        h1 {
            font-size: 1.5rem;
            color: #111827;
            margin-bottom: 0.5rem;
            margin-top: 0;
        }
        .price {
            font-size: 1.25rem;
            color: #10b981;
            font-weight: bold;
            margin-bottom: 2rem;
        }
        button {
            background-color: #000000;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #333333;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Premium Product</h1>
        <div class="price">$10.00</div>
        <button>Buy Now</button>
    </div>
</body>
</html>
