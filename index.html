<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Clean Store</title>
  <script src="https://www.paypal.com/sdk/js?client-id=YOUR_PAYPAL_CLIENT_ID&currency=USD"></script>
</head>
<body>
  <h1>Premium Product - $10.00</h1>
  
  <div id="paypal-button-container" style="max-width: 400px;"></div>

  <script>
    paypal.Buttons({
      // Sets up the transaction when the buyer clicks the button
      createOrder: function(data, actions) {
        return actions.order.create({
          purchase_units: [{
            amount: {
              value: '10.00' // Change this to your actual price
            }
          }]
        });
      },
      // Finalizes the transaction after the buyer approves it
      onApprove: function(data, actions) {
        return actions.order.capture().then(function(details) {
          alert('Payment successful! Thanks, ' + details.payer.name.given_name);
          // You can redirect them to a success page here later
        });
      }
    }).render('#paypal-button-container');
  </script>
</body>
</html>
